<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} - Claude Code Capture</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="brand">
                    <div class="brand-icon">
                        <i class="bi bi-lightning-charge-fill"></i>
                    </div>
                    <span>Capture</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Overview</div>
                    <ul class="nav-items">
                        <li class="nav-item">
                            <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                                <i class="bi bi-speedometer2"></i>
                                Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/sessions" class="nav-link {% if request.endpoint == 'sessions' %}active{% endif %}">
                                <i class="bi bi-collection"></i>
                                Sessions
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/analysis" class="nav-link {% if request.endpoint == 'analysis' %}active{% endif %}">
                                <i class="bi bi-graph-up"></i>
                                Analysis
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">
                    {% block page_title %}Dashboard{% endblock %}
                </h1>
                <div class="header-actions">
                    <span class="text-muted" style="font-size: 13px;">
                        <i class="bi bi-circle-fill" style="color: var(--success); font-size: 8px;"></i>
                        System Online
                    </span>
                </div>
            </header>

            <div class="content-area">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
